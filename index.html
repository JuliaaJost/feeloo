<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">

    <!-- Sorgt dafür, dass die App am Handy richtig skaliert wird -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Feeloo</title>

    <!-- Verbindung zu unserer CSS-Datei -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- Gesamter sichtbarer App-Bereich -->
<main class="app">

    <!-- Kopfbereich der App -->
    <header class="app-header">
        <p class="greeting">Hallo Lisa</p>
        <h1>Wie fühlst du dich heute?</h1>
        <p class="subtitle">Wähle den Mood, der gerade am besten passt.</p>
    </header>

    <!-- Großer ausgewählter Mood -->
    <section class="selected-mood-section">
        <img id="selectedMoodImage" src="images/Hervorragend.jpg" alt="Hervorragend" class="selected-mood-image">

        <h2 id="selectedMoodName">Hervorragend</h2>
        <p id="selectedMoodText">Schön, dass es dir heute so gut geht.</p>
    </section>

    <!-- Auswahl der Moodballs -->
    <section class="mood-selection">

        <button class="mood-button" data-mood="Wütend" data-color="angry">
            <img src="images/Wuetend.jpg" alt="Wütend">
            <span>Wütend</span>
        </button>

        <button class="mood-button" data-mood="Ängstlich" data-color="anxious">
            <img src="images/Ängstlich.jpg" alt="Ängstlich">
            <span>Ängstlich</span>

        </button>

        <button class="mood-button" data-mood="Traurig" data-color="sad">
            <img src="images/Traurig.jpg" alt="Traurig">
            <span>Traurig</span>
        </button>

        <button class="mood-button" data-mood="Müde" data-color="tired">
            <img src="images/Muede.jpg" alt="Müde">
            <span>Müde</span>
        </button>

        <button class="mood-button" data-mood="Neutral" data-color="neutral">
            <img src="images/Neutral.jpg" alt="Neutral">
            <span>Neutral</span>
        </button>

        <button class="mood-button" data-mood="Gut" data-color="good">
            <img src="images/Gut.jpg" alt="Gut">
            <span>Gut</span>
        </button>

        <button class="mood-button active" data-mood="Hervorragend" data-color="great">
            <img src="images/Hervorragend.jpg" alt="Hervorragend">
            <span>Hervorragend</span>
        </button>

    </section>

    <!-- Zusatzinformationen -->

    <section class="details-section">

        <h3>Erzähle uns mehr über deinen Tag</h3>

        <!-- Energielevel -->

        <label for="energy">Energielevel</label>

        <input
                type="range"
                id="energy"
                min="1"
                max="10"
                value="5">

        <!-- Stresslevel -->

        <label for="stress">Stresslevel</label>

        <input
                type="range"
                id="stress"
                min="1"
                max="10"
                value="5">

        <!-- Schlafqualität -->

        <label for="sleep">Schlafqualität</label>

        <input
                type="range"
                id="sleep"
                min="1"
                max="10"
                value="5">

        <!-- Persönliche Notiz -->

        <label for="note">Notiz</label>

        <textarea
                id="note"
                placeholder="Wie war dein Tag?"></textarea>

        <!-- Speichern -->

        <button id="saveButton">
            Mood speichern
        </button>

    </section>

</main>

<nav class="bottom-navigation">
    <button class="nav-button active" data-page="today">Today</button>
    <button class="nav-button" data-page="calendar">Kalender</button>
    <button class="nav-button" data-page="tips">Tipps</button>
    <button class="nav-button" data-page="stats">Statistik</button>
</nav>

<!-- Verbindung zu unserer JavaScript-Datei -->
<script src="js/app.js"></script>
</body>
</html>
